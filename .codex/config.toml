#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
tool_output_token_limit = 25000
# Leave room for native compaction near the 1,050,000 context window.
# Formula: 1,050,000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 ⇒ 1,050,000 - (25000 + 15000) = 1,010,000
model_context_window = 1050000
model_auto_compact_token_limit = 1010000
web_search = "live"
sandbox_mode = "workspace-write"
approvals_reviewer = "guardian_subagent"

[sandbox_workspace_write]
network_access = true

[features]
unified_exec = true
apply_patch_freeform = true
shell_snapshot = true
multi_agent = true
js_repl = true
memories = true
chronicle = true
guardian_approval = true
prevent_idle_sleep = true

[agents]
max_threads = 6
max_depth = 2

[notice]
hide_rate_limit_model_nudge = true

