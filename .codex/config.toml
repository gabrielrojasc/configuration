#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
tool_output_token_limit = 25000
# Leave room for native compaction near the 272,000 context window.
# Formula: 272,000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 => 272,000 - (25000 + 15000) = 232,000
model_context_window = 272000
model_auto_compact_token_limit = 232000
web_search = "live"
sandbox_mode = "workspace-write"
approvals_reviewer = "auto_review"

notify = ["/Users/gabriel/.codex/plugins/cache/openai-bundled/computer-use/1.0.758/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

