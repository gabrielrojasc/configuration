#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "high"
service_tier = "priority"
tool_output_token_limit = 25000
# Codex exposes 95% of the raw 272,000-token model window as usable context.
# Effective window: 272,000 * 0.95 = 258,400
# Formula: 258,400 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 => 258,400 - (25000 + 15000) = 218,400
model_context_window = 272000
model_auto_compact_token_limit = 218400
web_search = "live"
sandbox_mode = "workspace-write"
approvals_reviewer = "auto_review"

approval_policy = "on-request"

notify = ["/Users/gabriel/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

