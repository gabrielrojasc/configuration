#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
tool_output_token_limit = 25000
# Leave room for native compaction near the 272–273k context window.
# Formula: 272000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 ⇒ 272000 - (25000 + 15000) = 232000
model_context_window = 272000
model_auto_compact_token_limit = 232000
web_search = "live"
sandbox_mode = "workspace-write"
approvals_reviewer = "guardian_subagent"

[sandbox_workspace_write]
network_access = true

[features]
unified_exec = true
apply_patch_freeform = true
shell_snapshot = true
multi_agent = true
js_repl = true
memories = true
chronicle = true
guardian_approval = true
prevent_idle_sleep = true

[agents]
max_threads = 6
max_depth = 2

[mcp_servers.zf-google-workspace]
url = "https://mcp-gworkspace.nixhoodwink.com/mcp"

[mcp_servers.zf-grafana-prod]
url = "https://mcp.nixhoodwink.com/grafana/mcp"

[mcp_servers.zf-grafana-stag]
url = "https://mcp-stag.nixhoodwink.com/grafana/mcp"

[mcp_servers.zf-grafana-qa]
url = "https://mcp-qa.nixhoodwink.com/grafana/mcp"

